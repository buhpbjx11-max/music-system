<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<title>יצירת שיר 🎧</title>
<style>
body {
    font-family: Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    flex-direction:column;
    background:#111;
    color:white;
}

input {
    margin:10px;
    padding:12px;
    width:280px;
    border:none;
    border-radius:8px;
}

button {
    padding:12px 20px;
    border:none;
    border-radius:10px;
    background:#00c3ff;
    color:white;
    cursor:pointer;
    font-size:16px;
}

.result {
    margin-top:20px;
    word-break:break-all;
    text-align:center;
}
</style>
</head>

<body>

<h2>🎧 צור תקליט</h2>

<input type="text" id="img" placeholder="הדבק קישור לתמונה">
<input type="text" id="audio" placeholder="הדבק קישור לשיר (mp3)">
<input type="text" id="text" placeholder="שם השיר">

<button onclick="create()">צור לינק</button>

<div class="result" id="result"></div>

<script>
function create(){
    const img = document.getElementById("img").value;
    const audio = document.getElementById("audio").value;
    const text = document.getElementById("text").value;

    const link = ⁠ https://buhpbjx11-max.github.io/music-system/?img=${encodeURIComponent(img)}&audio=${encodeURIComponent(audio)}&text=${encodeURIComponent(text)} ⁠;

    document.getElementById("result").innerHTML = ⁠ <a href="${link}" target="_blank">${link}</a> ⁠;
}
</script>

</body>
</html>
